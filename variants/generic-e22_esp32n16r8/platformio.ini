[Generic_E22_S32n16r8]
extends = esp32_base
board = esp32-s3-devkitc-1-n16r8v
build_flags =
  ${esp32_base.build_flags}
  ${sensor_base.build_flags}
  -I variants/generic-e22_esp32n16r8  

  ; === LORA PIN ===
  -D P_LORA_NSS=10
  -D P_LORA_SCLK=12
  -D P_LORA_MOSI=11
  -D P_LORA_MISO=13
  -D P_LORA_RESET=9
  -D P_LORA_BUSY=14
  -D P_LORA_DIO_1=8

  -D SX126X_RXEN=6
  -D SX126X_TXEN=5
  
  ; === USER PIN ===
  -D PIN_USER_BTN=0
  -D PIN_STATUS_LED=48

  -D PIN_BUZZER=17
  -D PIN_GPS_RX=3 
  -D PIN_GPS_TX=8

  ; === RGB ESP32 LED ===
  -D RGB_LED_PIN=48
  -D RGB_LED_NUM=1
  -D RGB_LED_BRIGHTNESS=50

  ; === Config SX1262 ===
  -D SX126X_DIO2_AS_RF_SWITCH=false
  -D SX126X_DIO3_TCXO_VOLTAGE=1.8
  -D SX126X_CURRENT_LIMIT=140
  -D SX126X_RX_BOOSTED_GAIN=1
  -D USE_SX1262
  -D RADIO_CLASS=CustomSX1262
  -D WRAPPER_CLASS=CustomSX1262Wrapper
  -D MAX_LORA_TX_POWER=22
  

build_src_filter = ${esp32_base.build_src_filter}
  +<helpers/sensors>
  +<../variants/generic-e22_esp32n16r8>
lib_deps =
  ${esp32_base.lib_deps}
  ${sensor_base.lib_deps}
  adafruit/Adafruit NeoPixel @ ^1.11.0


[env:Generic_esp32n16r8_E22_sx1262_repeater]
extends = Generic_E22_S32n16r8
build_flags =
  ${Generic_E22_S32n16r8.build_flags}
  -D ADVERT_NAME='"KRT-E22S3N16-TestRepa"'
  -D LORA_TX_POWER=20
  -D ADVERT_LAT=0.0
  -D ADVERT_LON=0.0
  -D ADMIN_PASSWORD='"password"'
  -D MAX_NEIGHBOURS=50
build_src_filter = ${Generic_E22_S32n16r8.build_src_filter}
  +<../examples/simple_repeater/*.cpp>
lib_deps =
  ${Generic_E22_S32n16r8.lib_deps}
  ${esp32_ota.lib_deps}        

[env:Generic_esp32n16r8_E22_sx1262_companion_radio_ble]
extends = Generic_E22_S32n16r8
build_flags =
  ${Generic_E22_S32n16r8.build_flags}
  -I examples/companion_radio/ui-new
  -D MAX_CONTACTS=400
  -D MAX_GROUP_CHANNELS=40
  -D LORA_TX_POWER=20
  -D DISPLAY_CLASS=SSD1306Display
  -D CYRILLIC=1
  -D BLE_PIN_CODE=123456
  -D AUTO_SHUTDOWN_MILLIVOLTS=3400
  -D BLE_DEBUG_LOGGING=0
  -D MESH_DEBUG=1
  -D OFFLINE_QUEUE_SIZE=256

  -D ENV_PIN_SDA=15
  -D ENV_PIN_SCL=16
  -D ENV_INCLUDE_INA219=1
  -D ENV_INCLUDE_SHT4X=1
  -D PIN_BOARD_SDA=1
  -D PIN_BOARD_SCL=2

build_src_filter = ${Generic_E22_S32n16r8.build_src_filter}
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<helpers/ui/buzzer.cpp>
  +<helpers/esp32/*.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>
lib_deps =
  ${Generic_E22_S32n16r8.lib_deps}
  ${esp32_ota.lib_deps}
  densaugeo/base64 @ ~1.4.0
  end2endzone/NonBlockingRTTTL@^1.3.0
  adafruit/Adafruit INA219 @ ^1.2.3
  adafruit/Adafruit SHT31 Library @ ^2.2.2
  adafruit/Adafruit SSD1306 @ ^2.5.13

[env:Generic_esp32n16r8_E22_sx1262_companion_radio_wifi]
extends = Generic_E22_S32n16r8
build_flags =
  ${Generic_E22_S32n16r8.build_flags}
  -I examples/companion_radio/ui-new
  -D DISPLAY_CLASS=SSD1306Display
  -D DISPLAY_ROTATION=2
  -D LORA_TX_POWER=17
  -D HAS_SCREEN=1
  -D USE_SSD1306=1
  -D CYRILLIC=1
  -D MAX_CONTACTS=400
  -D MAX_GROUP_CHANNELS=40
  -D OFFLINE_QUEUE_SIZE=256
  -D WIFI_DEBUG_LOGGING=1
  -D WIFI_SSID='"FackenNet"'
  -D WIFI_PWD='"12345678"'
build_src_filter = ${Generic_E22_S32n16r8.build_src_filter}
  +<helpers/esp32/*.cpp>
  +<helpers/ui/SSD1306Display.cpp>
  +<helpers/ui/MomentaryButton.cpp>
  +<../examples/companion_radio/*.cpp>
  +<../examples/companion_radio/ui-new/*.cpp>

lib_deps =
  ${Generic_E22_S32n16r8.lib_deps}
  ${esp32_ota.lib_deps}
  densaugeo/base64 @ ~1.4.0